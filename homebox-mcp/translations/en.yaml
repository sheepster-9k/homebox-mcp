---
configuration:
  homebox_url:
    name: Homebox URL
    description: URL of the Homebox server (e.g., http://homeassistant.local:7745)
  homebox_token:
    name: Homebox API Token
    description: >-
      Static API token for Homebox. Leave empty if using username/password login instead.
      You can also get a token from the /login page.
  homebox_username:
    name: Homebox Username
    description: >-
      Username for Homebox login. Used as an alternative to a static token —
      the server will authenticate automatically and refresh on expiry.
  homebox_password:
    name: Homebox Password
    description: >-
      Password for Homebox login. Used together with username.
  mcp_auth_enabled:
    name: Enable MCP Authentication
    description: When enabled, clients must provide a Bearer token to access the MCP endpoint. Recommended to test without auth first, then enable.
  mcp_auth_token:
    name: MCP Auth Token
    description: Bearer token that clients must provide to access the MCP endpoint. Only used when MCP Authentication is enabled.
  log_level:
    name: Log Level
    description: Logging level for the MCP server
